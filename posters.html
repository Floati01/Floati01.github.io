<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posters - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #333;
        }

        header {
            background: #000;
            padding: 20px;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .header-left {
            display: flex;
            gap: 30px;
            flex: 1;
        }

        .header-left a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 12px;
            transition: color 0.3s;
        }

        .header-left a:hover {
            color: #999;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #fff;
            flex: 1;
            text-align: center;
        }

        .header-right {
            display: flex;
            gap: 20px;
            flex: 1;
            justify-content: flex-end;
        }

        .header-right a {
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s;
        }

        .header-right a:hover {
            color: #999;
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: white;
            overflow: hidden;
            border-radius: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
            cursor: pointer;
        }

        .gallery-item p {
            padding: 15px;
            font-size: 14px;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.92);
            z-index: 2000;
            cursor: zoom-out;
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox img {
            max-width: min(96vw, 1800px);
            max-height: 92vh;
            width: auto;
            height: auto;
            object-fit: contain;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            nav {
                flex-direction: column;
                gap: 10px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <a href="#work">Work</a>
                <a href="#contact">Contact</a>
                <a href="#prints">Prints</a>
            </div>
            <div class="logo">FLOATI</div>
            <div class="header-right">
                <a href="#">Instagram</a>
                <a href="#">Twitter</a>
            </div>
        </div>
    </header>

    <main>
        <h1>Posters</h1>
        <div class="gallery">
            <div class="gallery-item">
                <img src="images/posters/1.jpg" alt="Poster 1">
                <p>Title or description</p>
            </div>
            <div class="gallery-item">
                <img src="images/posters/2.jpg" alt="Poster 2">
                <p>Title or description</p>
            </div>
            <div class="gallery-item">
                <img src="images/posters/3.jpg" alt="Poster 3">
                <p>Title or description</p>
            </div>
            <div class="gallery-item">
                <img src="images/posters/4.jpg" alt="Poster 4">
                <p>Title or description</p>
            </div>
            <div class="gallery-item">
                <img src="images/posters/5.jpg" alt="Poster 5">
                <p>Title or description</p>
            </div>
            <div class="gallery-item">
                <img src="images/posters/6.jpg" alt="Poster 6">
                <p>Title or description</p>
            </div>
        </div>
    </main>

    <div class="lightbox" id="lightbox" aria-hidden="true">
        <img id="lightbox-image" alt="Expanded poster">
    </div>

    <script>
        (function () {
            const lightbox = document.getElementById('lightbox');
            const lightboxImage = document.getElementById('lightbox-image');
            const thumbnails = Array.from(document.querySelectorAll('.gallery-item img'));
            let currentIndex = -1;

            function showImage(index) {
                currentIndex = (index + thumbnails.length) % thumbnails.length;
                const thumbnail = thumbnails[currentIndex];
                lightboxImage.src = thumbnail.src;
                lightboxImage.alt = thumbnail.alt;
            }

            function openLightbox(index) {
                showImage(index);
                lightbox.classList.add('open');
                lightbox.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                lightbox.classList.remove('open');
                lightbox.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
            }

            thumbnails.forEach((thumbnail, index) => {
                thumbnail.addEventListener('click', () => {
                    openLightbox(index);
                });
            });

            lightbox.addEventListener('click', (event) => {
                if (event.target === lightbox || event.target === lightboxImage) {
                    closeLightbox();
                }
            });

            document.addEventListener('keydown', (event) => {
                if (!lightbox.classList.contains('open')) {
                    return;
                }

                if (event.key === 'Escape') {
                    closeLightbox();
                } else if (event.key === 'ArrowRight') {
                    showImage(currentIndex + 1);
                } else if (event.key === 'ArrowLeft') {
                    showImage(currentIndex - 1);
                }
            });
        })();
    </script>
</body>
</html>
