<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation - Portfolio</title>
    <link rel="stylesheet" href="shared-header.css">
    <script defer src="shared-header.js"></script>
    <link rel="stylesheet" href="shared-gallery.css">
    <script defer src="shared-gallery.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: transparent;
            color: #333;
        }

        .gallery {
            --gallery-gap: 8px;
            --gallery-columns: 1;
            --gallery-columns-mobile: 1;
            --gallery-gap-mobile: 8px;
        }

        main {
            max-width: 1200px;
            margin: 27px auto 40px;
            padding: 0 20px;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <main>
        <div class="gallery" data-gallery-folder="images/animation" data-gallery-prefix="Animation" data-gallery-mode="numbered" data-gallery-layout="adaptive-grid" data-gallery-extensions="mp4"></div>
    </main>
</body>
</html>
