<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 14px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #666;
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: white;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .gallery-item p {
            padding: 15px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            nav {
                flex-direction: column;
                gap: 10px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">PORTFOLIO</div>
            <nav>
                <a href="index.html">Home</a>
                <a href="artwork.html">Artwork</a>
                <a href="posters.html">Posters</a>
                <a href="headers.html">Headers</a>
                <a href="animation.html">Animation</a>
            </nav>
        </div>
    </header>

    <main>
        <h1>Artwork</h1>
        <div class="gallery">
            <div class="gallery-item">
                <img src="images/artwork-1.jpg" alt="Artwork 1">
                <p>Title or description</p>
            </div>
            <div class="gallery-item">
                <img src="images/artwork-2.jpg" alt="Artwork 2">
                <p>Title or description</p>
            </div>
            <div class="gallery-item">
                <img src="images/artwork-3.jpg" alt="Artwork 3">
                <p>Title or description</p>
            </div>
            <div class="gallery-item">
                <img src="images/artwork-4.jpg" alt="Artwork 4">
                <p>Title or description</p>
            </div>
            <div class="gallery-item">
                <img src="images/artwork-5.jpg" alt="Artwork 5">
                <p>Title or description</p>
            </div>
            <div class="gallery-item">
                <img src="images/artwork-6.jpg" alt="Artwork 6">
                <p>Title or description</p>
            </div>
        </div>
    </main>
</body>
</html>
